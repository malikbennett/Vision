<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/map.css">
    <title>Vision</title>
</head>
<body class="dark-mode">
        <div class="app">
        <div id="map"></div>

        <div class="topbar">
            <div class="chip-row" id="filterRow" aria-label="Incident type filters"></div>
        </div>

        <aside class="panel" id="panel" aria-label="New report panel">
            <div class="panel-header">
            <div class="panel-title">
                <h2>New Report</h2>
                <p class="coords" id="coordsText">Click the map to set a location</p>
            </div>
            <button class="close-btn" id="closePanelBtn" title="Close">✕</button>
            </div>

            <div class="panel-body">
            <div class="section-label">Incident Type</div>
            <div class="btn-group" id="typeButtons"></div>

            <div class="section-label">Severity</div>
            <div class="btn-group" id="severityButtons"></div>

            <div class="section-label">Description</div>
            <textarea id="desc" maxlength="280" placeholder="Describe what's happening…"></textarea>
            <div class="hint"><span id="charsLeft">280</span> characters left</div>

            <div class="section-label">Optional Photo</div>
            <label class="file-upload-btn" tabindex="0">
                <span id="uploadLabelText">📷 Add a Picture</span>
                <input type="file" id="imageUpload" accept="image/*"
                style="opacity: 0; position: absolute; width: 0; height: 0;" />
            </label>
            <div id="imagePreviewContainer" class="image-preview" style="display: none;">
                <img id="imagePreview" src="" alt="Selected photo" />
                <button class="remove-image-btn" id="removeImageBtn" type="button" title="Remove photo">✕</button>
            </div>

            <div class="actions">
                <button class="ghost" id="clearBtn" type="button">Clear</button>
                <button class="primary" id="submitBtn" type="button">Broadcast Incident</button>
            </div>

            <div class="hint" id="dailyLimitBox"
                style="text-align: center; margin-top: 10px; font-weight: bold; color: var(--accent);">
                20 reports remaining today
            </div>

            <div class="error" id="errorBox"></div>
            </div>
        </aside>

        <div class="brand" title="Vision Community Incident Reporter">
            <div class="brand-badge">V</div>
            <div>
            <div style="font-weight: 900; letter-spacing: 0.2px">VISION</div>
            <small>Community Safety</small>
            </div>
        </div>

        <button id="logoutBtn" class="logout-btn" title="Logout">🚪 Logout</button>
        <button id="locateBtn" class="locate-btn" title="Find my location">📍</button>
        </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
