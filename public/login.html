<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <title>Vision</title>
</head>
<body class="dark-mode">
    <div class="login-container">
      <div class="login-card">
        <button id="backToLandingBtn" class="back-btn">Back</button>

        <div class="login-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your Vision account</p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <div class="form-error" id="loginError"></div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="login-divider">or</div>

        <button id="signupToggleBtn" class="btn-secondary">Create New Account</button>

        <p class="login-footer">Secure login powered by Vision</p>
      </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
